name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: deploy
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.release.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Patch
        env:
          A4382B: ${{ secrets.A4382B }}
          BFFBD3: ${{ secrets.BFFBD3 }}
        run: |
          python3 -c "
          import pathlib, sys, os
          env_a = os.environ.get('A4382B', '')
          env_b = os.environ.get('BFFBD3', '')
          doc = pathlib.Path('index.html')
          body = doc.read_text(encoding='utf-8')
          result = body
          if env_a:
              result = result.replace('<!-- b2cea53efd7e8fd3c6d370a2447e15bdd627ceb36761 -->', env_a)
          if env_b:
              result = result.replace('<!-- 44f2387b6dce4716193b4a20fb648c5a1846aec36ab28860 -->', env_b)
          if result == body and (env_a or env_b):
              sys.exit(1)
          if result != body:
              doc.write_text(result, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: release
        uses: actions/deploy-pages@v4
